personality = "pragmatic"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
allow_login_shell = false

model_reasoning_summary = "concise"
model_verbosity = "low"

web_search = "live"

project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md"]

[sandbox_workspace_write]
network_access = true

[shell_environment_policy]
inherit = "core"
experimental_use_profile = false
exclude = [
  "*KEY*",
  "*TOKEN*",
  "*SECRET*",
  "AWS_*",
  "GOOGLE_*",
  "GCP_*",
  "AZURE_*",
  "OPENAI_API_KEY",
  "ANTHROPIC_API_KEY"
]

[feedback]
enabled = false

[projects."/Users/snhryt/workspace/articles"]
trust_level = "trusted"

[projects."/Users/snhryt/workspace/apply-dataform-workflows"]
trust_level = "trusted"

[projects."/Users/snhryt/workspace/mybest/mybest-dataform"]
trust_level = "trusted"

[projects."/Users/snhryt/workspace/dataform-example"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true
