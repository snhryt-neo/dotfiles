name: Installation test on macOS

on:
  pull_request:
    paths:
      - .github/workflows/actions.yml
      - brewfiles/Brewfile
      - init.sh
      - mise.toml
      - nonbrew.sh
      - Taskfile.yml
      - apm/apm.yml
      - apm/apm.lock.yaml
  workflow_dispatch:
    inputs:
      full_brew_test:
        description: "Homebrew 全量テスト（全パッケージを検証）"
        type: boolean
        default: false

permissions: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      changed_files: ${{ steps.set-changed-files.outputs.changed_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # https://github.com/tj-actions/changed-files
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        # To compare changes between the current commit and the last pushed remote commit set `since_last_remote_commit: true`. e.g
        # with:
        #   since_last_remote_commit: true

      - name: Set changed files
        id: set-changed-files
        env:
          ALL_CHANGED: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "changed_files=$ALL_CHANGED" >> $GITHUB_OUTPUT

  run:
    runs-on: macos-latest
    needs: setup
    permissions:
      contents: read
    timeout-minutes: 20
    env:
      MISE_PYTHON_GITHUB_ATTESTATIONS: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      # https://github.com/go-task/setup-task
      - name: Install Task (go-task)
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x

      - name: Taskfile syntax check
        if: contains(needs.setup.outputs.changed_files, 'Taskfile.yml')
        run: |
          task --dry init
          task --dry link
          task --dry brew
          task --dry skills
          task --dry nonbrew

      - name: Initialization test
        if: contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml') || contains(needs.setup.outputs.changed_files, 'init.sh') || contains(needs.setup.outputs.changed_files, 'brewfiles/Brewfile') || contains(needs.setup.outputs.changed_files, 'nonbrew.sh')
        run: task init

      - name: Symlink test
        if: contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml') || contains(needs.setup.outputs.changed_files, 'mise.toml')
        run: |
          command -v mise || brew install mise
          task link
          mise dotfiles status --missing
          ls -al $HOME/.config

      # PR・workflow_dispatch（full_brew_test=false）では追加パッケージのみインストール
      # inputs.* は type: boolean で実際の boolean 値を返すため !inputs.full_brew_test は安全
      - name: Homebrew test (差分のみ)
        if: >-
          !inputs.full_brew_test &&
          (contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') ||
           contains(needs.setup.outputs.changed_files, 'brewfiles/Brewfile') ||
           contains(needs.setup.outputs.changed_files, 'nonbrew.sh'))
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA=$(git rev-parse HEAD^)
          fi
          git diff "${BASE_SHA}"...HEAD -- brewfiles/Brewfile \
            | grep '^+[^+]' | sed 's/^+//' \
            > /tmp/Brewfile.diff
          if [ -s /tmp/Brewfile.diff ]; then
            # GitHubランナーのHomebrewは HOMEBREW_REQUIRE_TAP_TRUST が有効で、
            # brew trust で信頼していない非公式tapのformula読み込みを拒否するため、
            # diffに追加されたtapを brew bundle の前に信頼しておく
            grep -o '^tap "[^"]*"' /tmp/Brewfile.diff | cut -d'"' -f2 | while read -r t; do
              brew trust --tap "$t"
            done
            echo "📦 追加パッケージをインストール中..."
            brew bundle --file=/tmp/Brewfile.diff
          else
            echo "✅ Brewfile に追加パッケージなし、スキップ"
          fi

      # workflow_dispatch で full_brew_test=true のときのみ全量テスト
      - name: Homebrew test (全量)
        if: github.event_name == 'workflow_dispatch' && inputs.full_brew_test
        run: task brew

      - name: Skills test
        if: contains(needs.setup.outputs.changed_files, 'apm/apm.yml') || contains(needs.setup.outputs.changed_files, 'apm/apm.lock.yaml') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml')
        continue-on-error: true
        # task skills は ~/.apm/apm.yml を読むため、miseによるSymlink testが走らない場合に備えて
        # このステップ内でも必要なリンクを作成し、APM関連ファイルだけの変更時も自己完結させる
        run: |
          # HOMEBREW_REQUIRE_TAP_TRUST が有効なランナーでは非公式tapの事前信頼が必要
          command -v apm || { brew trust --tap microsoft/apm && brew install microsoft/apm/apm; }
          mkdir -p "$HOME/.apm"
          ln -sf "$PWD/apm/apm.yml" "$HOME/.apm/apm.yml"
          ln -sf "$PWD/apm/apm.lock.yaml" "$HOME/.apm/apm.lock.yaml"
          task skills

      # brew が走らなかった場合でも nonbrew.sh の前提コマンドを保証
      - name: Ensure nonbrew prerequisites are installed
        if: >-
          contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') ||
          contains(needs.setup.outputs.changed_files, 'Taskfile.yml') ||
          contains(needs.setup.outputs.changed_files, 'nonbrew.sh')
        run: |
          command -v mise || brew install mise
          command -v uv || brew install uv

      - name: Non-Homebrew tools test
        if: contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml') || contains(needs.setup.outputs.changed_files, 'nonbrew.sh')
        run: task nonbrew
