name: Installation test on macOS

on:
  pull_request:
    paths:
      - .github/workflows/actions.yml
      - brewfiles/Brewfile
      - init.sh
      - link.sh
      - other.sh
      - Taskfile.yml
      - claude_global/Skillfile
  workflow_dispatch:
    inputs:
      full_brew_test:
        description: "Homebrew 全量テスト（全パッケージを検証）"
        type: boolean
        default: false

permissions: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      changed_files: ${{ steps.set-changed-files.outputs.changed_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # https://github.com/tj-actions/changed-files
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        # To compare changes between the current commit and the last pushed remote commit set `since_last_remote_commit: true`. e.g
        # with:
        #   since_last_remote_commit: true

      - name: Set changed files
        id: set-changed-files
        env:
          ALL_CHANGED: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "changed_files=$ALL_CHANGED" >> $GITHUB_OUTPUT

  run:
    runs-on: macos-latest
    needs: setup
    permissions:
      contents: read
    timeout-minutes: 20
    env:
      MISE_PYTHON_GITHUB_ATTESTATIONS: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      # https://github.com/arduino/setup-task
      - name: Install Task (go-task)
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.ACCESS_TOKEN }}

      - name: Taskfile syntax check
        if: contains(needs.setup.outputs.changed_files, 'Taskfile.yml')
        run: |
          task --dry init
          task --dry link
          task --dry brew
          task --dry skills
          task --dry other

      - name: Initialization test
        if: contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml') || contains(needs.setup.outputs.changed_files, 'init.sh') || contains(needs.setup.outputs.changed_files, 'brewfiles/Brewfile') || contains(needs.setup.outputs.changed_files, 'other.sh')
        run: task init

      - name: Symlink test
        if: contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml') || contains(needs.setup.outputs.changed_files, 'link.sh')
        run: |
          task link
          ls -al $HOME/.config

      # PR・workflow_dispatch（full_brew_test=false）では追加パッケージのみインストール
      # inputs.* は type: boolean で実際の boolean 値を返すため !inputs.full_brew_test は安全
      - name: Homebrew test (差分のみ)
        if: >-
          !inputs.full_brew_test &&
          (contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') ||
           contains(needs.setup.outputs.changed_files, 'brewfiles/Brewfile') ||
           contains(needs.setup.outputs.changed_files, 'other.sh'))
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA=$(git rev-parse HEAD^)
          fi
          git diff "${BASE_SHA}"...HEAD -- brewfiles/Brewfile \
            | grep '^+[^+]' | sed 's/^+//' \
            > /tmp/Brewfile.diff
          if [ -s /tmp/Brewfile.diff ]; then
            echo "📦 追加パッケージをインストール中..."
            brew bundle --file=/tmp/Brewfile.diff
          else
            echo "✅ Brewfile に追加パッケージなし、スキップ"
          fi

      # workflow_dispatch で full_brew_test=true のときのみ全量テスト
      - name: Homebrew test (全量)
        if: github.event_name == 'workflow_dispatch' && inputs.full_brew_test
        run: task brew

      - name: Skills test
        if: contains(needs.setup.outputs.changed_files, 'claude_global/Skillfile') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml')
        continue-on-error: true
        run: task skills

      # brew が走らなかった場合でも mise を保証（other.sh が mise に依存するため）
      - name: Ensure mise and uv are installed
        if: >-
          contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') ||
          contains(needs.setup.outputs.changed_files, 'Taskfile.yml') ||
          contains(needs.setup.outputs.changed_files, 'other.sh')
        run: |
          command -v mise || brew install mise
          command -v uv || brew install uv

      - name: Other test
        if: contains(needs.setup.outputs.changed_files, '.github/workflows/actions.yml') || contains(needs.setup.outputs.changed_files, 'Taskfile.yml') || contains(needs.setup.outputs.changed_files, 'other.sh')
        run: task other
