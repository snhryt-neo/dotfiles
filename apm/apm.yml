# エージェントスキルの宣言ファイル
# APM (Agent Package Manager: https://github.com/microsoft/apm) のグローバルマニフェスト。
# mise.toml が本ファイルと apm.lock.yaml を ~/.apm/ にリンクする。
#
# インストール: task skills
# 更新:         task skills-update （apm.lock.yaml が更新されるので diff をコミットする）
name: dotfiles-global
version: 1.0.0

# claude → ~/.claude/skills/、codex → ~/.agents/skills/ にそれぞれ展開される。
targets:
  - claude
  - codex

dependencies:
  apm:
    # バージョンはここでは固定せず apm.lock.yaml のコミットSHAで固定する
    # （インストール時に unpinned 警告が出るが意図的なもの）
    - google/skills/skills/cloud/gcloud
    - google/skills/skills/cloud/bigquery-basics
    - google/skills/skills/cloud/cloud-run-basics
    - google/skills/skills/cloud/gemini-api
    # 自作スキル（skills/ 配下）の自己参照。
    # APM のローカルパス依存はグローバルスコープでは相対パスを解決できず、
    # 絶対パスはマシン依存になるため、GitHub 経由のサブパス参照で統一している。
    # 編集内容は main へのマージ後に task skills-update を実行するまで反映されない点に注意。
    - snhryt-neo/dotfiles/skills/dev-research
    - snhryt-neo/dotfiles/skills/empirical-prompt-tuning
    - snhryt-neo/dotfiles/skills/gh-markdown
    - snhryt-neo/dotfiles/skills/gha-security-review
    - snhryt-neo/dotfiles/skills/graphify
    - snhryt-neo/dotfiles/skills/imagegen
