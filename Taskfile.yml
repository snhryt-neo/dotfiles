version: "3"

silent: true

tasks:
  default:
    aliases:
      - list
    desc: List all tasks
    cmd: task -l

  setup-all:
    desc: "Setup all"
    cmds:
      - task: init
      - task: brew
      - task: brew-mas
      - task: link
      - task: skills
      - task: gui
      - task: git
      - task: other

  init:
    desc: "Install Rosetta-2 and Homebrew"
    cmd: sh ./init.sh

  brew:
    desc: "Installing apps and command line tools with Homebrew"
    cmds:
      - brew bundle --file=brewfiles/Brewfile
      # 数少ないIntel CPUでインストール不可能なappのため、例外的にベタ書き
      - if [[ $(uname -m) == "arm64" ]]; then brew install --cask chatgpt; fi

  brew-mas:
    desc: "Installing Mac App Store apps with Homebrew"
    cmd: brew bundle --file=brewfiles/Brewfile.mas

  link:
    desc: "Creating symlinks of dotfiles"
    cmd: zsh ./link.sh

  gui:
    desc: "Configuring MacOS GUI"
    cmd: sh ./gui.sh

  git:
    desc: "Configuring GitHub"
    cmd: sh ./github.sh

  skills:
    desc: "Skillfile から外部スキルをインストール"
    cmds:
      - |
        while IFS= read -r line || [ -n "$line" ]; do
          [[ "$line" =~ ^[[:space:]]*# ]] && continue
          [[ -z "${line//[[:space:]]/}" ]] && continue
          gh skill install $line --agent claude-code --scope user --force
        done < claude_global/skills/Skillfile

  skills-update:
    desc: "インストール済みの外部スキルをアップデート"
    cmd: gh skill update --agent claude-code --scope user

  other:
    desc: "Configuring others"
    cmd: sh ./other.sh
