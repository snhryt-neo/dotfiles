version: "3"

silent: true

tasks:
  default:
    aliases:
      - list
    desc: List all tasks
    cmd: task -l

  setup-all:
    desc: "Setup all"
    cmds:
      - task: init
      - task: brew
      - task: brew-mas
      - task: nonbrew
      - task: link
      - task: github
      - task: gui
      - task: skills

  init:
    desc: "Install Rosetta-2 and Homebrew"
    cmd: ./init.sh

  brew:
    desc: "Installing apps and command line tools with Homebrew"
    cmds:
      - brew bundle --file=brewfiles/Brewfile
      # 数少ないIntel CPUでインストール不可能なappのため、例外的にベタ書き
      - if [[ $(uname -m) == "arm64" ]]; then brew install --cask chatgpt; fi

  brew-mas:
    desc: "Installing Mac App Store apps with Homebrew"
    cmd: brew bundle --file=brewfiles/Brewfile.mas

  link:
    desc: "Creating symlinks of dotfiles"
    cmd: ./link.sh

  gui:
    desc: "Configuring MacOS GUI"
    cmd: ./gui.sh

  github:
    desc: "Configuring GitHub"
    cmd: ./github.sh

  skills:
    desc: "apm.yml からエージェントスキルをインストール"
    # ~/.apm/apm.yml（link.sh が apm/apm.yml をリンク）を読み、apm.lock.yaml の
    # コミットSHAどおりに ~/.claude/skills/ と ~/.agents/skills/ の両方へ展開する
    cmd: apm install -g

  skills-update:
    desc: "インストール済みのスキルをアップデート"
    # 最新コミットへ更新すると apm.lock.yaml が書き換わる（symlink経由でリポジトリ側の
    # apm/apm.lock.yaml に反映される）ため、更新後は lock の diff をコミットする
    cmd: apm update -g -y

  nonbrew:
    desc: "Installing tools not managed by Homebrew"
    cmd: ./nonbrew.sh
